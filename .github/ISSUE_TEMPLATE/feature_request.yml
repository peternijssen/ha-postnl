name: Feature request
description: Suggest a new feature or enhancement for the PostNL integration
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - peternijssen
body:
  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you have in mind.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Is there an existing workaround, or have you tried something else?
