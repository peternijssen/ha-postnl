# Notify when PostNL's MyMail service announces a new letter.
#
# Listens for postnl_letter_announced, which fires once per newly-seen
# letter id from the second coordinator refresh onward (the first
# refresh is silent so we do not re-fire for letters that already
# existed before HA started).
#
# The notification carries the scanned letter image as an attachment.
# Both iOS and Android companion apps render the image inline.

alias: "PostNL: new letter announced"
description: Notify when MyMail announces a new letter, with the scan attached.
mode: queued
max: 5

triggers:
  - trigger: event
    event_type: postnl_letter_announced

actions:
  - action: notify.mobile_app
    data:
      title: "Brief aangekondigd"
      message: >-
        Vandaag komt er een brief binnen
        {%- if trigger.event.data.date %} (gedateerd {{ trigger.event.data.date }}){% endif %}.
      data:
        # iOS
        attachment:
          url: "{{ trigger.event.data.image_url }}"
          content-type: jpeg
        # Android
        image: "{{ trigger.event.data.image_url }}"
